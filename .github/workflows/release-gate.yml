name: Release Gate

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  release-gate:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install LLVM 17
        run: |
          brew install llvm@17
          echo "LLVM_SYS_170_PREFIX=$(brew --prefix llvm@17)" >> "$GITHUB_ENV"
          echo "$(brew --prefix llvm@17)/bin" >> "$GITHUB_PATH"

      - name: Run release gate
        run: bash scripts/release_gate.sh
